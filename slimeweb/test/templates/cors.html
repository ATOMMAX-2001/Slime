<!doctype html>
<html>
    <body>
        <script>
            fetch("http://localhost:3000/json", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                },
            })
                .then((res) => res.json())
                .then((data) => console.log(data))
                .catch((err) => console.error("CORS ERROR:", err));
        </script>
    </body>
</html>
